name: Lighthouse CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Adjust to the project's required Node.js version

      - name: Install dependencies
        run: npm install --legacy-peer-deps # Use --legacy-peer-deps if needed due to peer dependency issues

      - name: Build project
        run: npm run build # Assumes a 'build' script exists in package.json that generates static assets

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli@0.12.x # Install LHCI CLI globally

      - name: Serve built project and run Lighthouse CI
        run: |
          # Install 'serve' package to serve the static build output
          npm install -g serve
          # Start serving the 'build' directory on port 8080 in the background
          # Adjust 'build' to your actual build output directory (e.g., 'dist', 'out')
          serve -s build -l 8080 &

          # Install 'wait-on' package to wait for the server to be ready
          npm install -g wait-on
          wait-on http://localhost:8080

          # Run Lighthouse CI against the locally served build
          lhci autorun \
            --collect.url=http://localhost:8080 \
            --collect.numberOfRuns=3 \
            --assert.preset=lighthouse:recommended \
            --upload.target=temporary-public-storage \
            --upload.githubToken=${{ secrets.GITHUB_TOKEN }} # Enables PR comments and status checks
        env:
          # Increase Node.js memory limit for large builds or Lighthouse runs if needed
          NODE_OPTIONS: "--max-old-space-size=4096"
          # Optionally, if using a persistent LHCI server, configure LHCI_TOKEN
          # LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}
