language: "en-US"
reviews:
  poem: false
  suggested_reviewers: false
  suggested_labels: false
  sequence_diagrams: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  profile: chill
  auto_review:
    enabled: true
    auto_incremental_review: true
    ignore_usernames: [dependabot, asyncapi-bot]
  review_status: true
  commit_status: true
  changed_files_summary: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  pre_merge_checks:
    title:
      mode: error
      requirements: "Use a concise title that follows our Conventional Commits guidelines and clearly summarizes the change using imperative mood (it means spoken or written as if giving a command or instruction, like 'add new helper for listing operations'). In Generator, prepend feat: or fix: in PR title only when PATCH/MINOR release must be triggered."
  tools:
    markdownlint:
      enabled: true
    biome:
      enabled: true
    github-checks:
      enabled: true
      timeout_ms: 180000
    languagetool:
      enabled: true
      enabled_only: false
      level: default
    hadolint:
      enabled: true
    yamllint:
      enabled: true
    gitleaks:
      enabled: true
    eslint:
      enabled: true
    actionlint:
      enabled: true
    semgrep:
      enabled: true
knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  # Code Guidelines - automatically detects team standards
  code_guidelines:
    enabled: true
    filePatterns:
      # Add custom patterns here if you have other guideline files:
      - ".github/pr-review-checklist.md"
      - "CONTRIBUTING.md"
  learnings:
    scope: "local"
  issues:
    scope: "local"
  pull_requests:
    scope: "local"
  mcp:
    usage: auto
